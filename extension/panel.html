<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
      line-height: 1.4;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
    }

    .stat {
      background: #16213e;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid #2a2a4a;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat.errors .stat-value {
      color: #ef4444;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin: 16px 0 8px 0;
    }

    .list {
      background: #0f0f23;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .list.network { max-height: 300px; }
    .list.console { max-height: 200px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid #1a1a2e;
      font-size: 12px;
      font-family: monospace;
    }

    .list-item:last-child { border-bottom: none; }

    .list-item .method {
      font-weight: 600;
      color: #eab308;
      min-width: 40px;
    }

    .list-item .url {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #aaa;
    }

    .list-item .status {
      color: #ef4444;
      font-weight: 600;
      min-width: 30px;
      text-align: right;
    }

    .list-item .time {
      color: #666;
      min-width: 50px;
      text-align: right;
    }

    .list-item .level-icon {
      min-width: 16px;
      text-align: center;
    }

    .list-item .message {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #aaa;
    }

    .list-item .timestamp {
      color: #666;
      font-size: 11px;
      min-width: 80px;
      text-align: right;
    }

    .empty-list {
      padding: 16px;
      text-align: center;
      color: #555;
      font-style: italic;
    }

    /* Queue Section */
    .queue-section {
      margin: 16px 0;
      padding: 10px;
      background: #16213e;
      border-radius: 6px;
      border: 1px solid #2a2a4a;
      display: none;
    }

    .queue-section.visible { display: block; }

    .queue-status-text {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .btn-terminal-panel {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #2a2a4a;
      color: #ccc;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-terminal-panel:hover { background: #3a3a5a; }

    /* Buttons */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-report {
      background: #22c55e;
      color: #000;
      flex: 1;
    }

    .btn-report:hover:not(:disabled) { background: #16a34a; }
    .btn-report:disabled { background: #333; color: #666; cursor: not-allowed; }

    .btn-clear {
      background: #2a2a4a;
      color: #ccc;
    }

    .btn-clear:hover { background: #3a3a5a; }

    /* Toast */
    .panel-toast {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: #22c55e;
      color: #000;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .panel-toast.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>Bug Bridge</h1>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="request-count">0</div>
      <div class="stat-label">Requests captured</div>
    </div>
    <div class="stat errors">
      <div class="stat-value" id="error-count">0</div>
      <div class="stat-label">Errors detected</div>
    </div>
  </div>

  <h2>Network Errors</h2>
  <div class="list network" id="network-errors-list">
    <div class="empty-list">No network errors captured yet</div>
  </div>

  <h2>Console Errors</h2>
  <div class="list console" id="console-errors-list">
    <div class="empty-list">No console errors captured yet</div>
  </div>

  <div class="queue-section" id="panel-queue-section">
    <div class="queue-status-text" id="panel-queue-status">Checking...</div>
    <button class="btn-terminal-panel" id="panel-terminal-btn" style="display:none">
      Open Terminal
    </button>
  </div>

  <div class="actions">
    <button class="btn btn-report" id="panel-report-btn">Report Bug</button>
    <button class="btn btn-clear" id="panel-clear-btn">Clear Data</button>
  </div>

  <div class="panel-toast" id="panel-toast"></div>

  <script src="panel.js"></script>
</body>
</html>
